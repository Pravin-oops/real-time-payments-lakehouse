
# =============================================================================
# MEDALLION LAKEHOUSE — Full Local Stack
# Batch (UPI JSON) + Real-Time (Credit Card via Kafka)
# Bronze → Silver → Gold (Delta Lake) → PostgreSQL → Streamlit
# =============================================================================

x-airflow-common: &airflow-common
  image: apache/airflow:2.8.1-python3.11
  env_file: .env
  environment: &airflow-env
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    AIRFLOW__CORE__FERNET_KEY: ${AIRFLOW_FERNET_KEY}
    AIRFLOW__CORE__LOAD_EXAMPLES: "false"
    AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: "false"
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://${POSTGRES_AIRFLOW_USER}:${POSTGRES_AIRFLOW_PASSWORD}@postgres-meta:5432/${POSTGRES_AIRFLOW_DB}
    AIRFLOW__WEBSERVER__SECRET_KEY: ${AIRFLOW_SECRET_KEY}
    AIRFLOW__WEBSERVER__EXPOSE_CONFIG: "true"
    AIRFLOW__LOGGING__BASE_LOG_FOLDER: /opt/airflow/logs
    SPARK_MASTER_URL: spark://spark-master:7077
    KAFKA_BOOTSTRAP_SERVERS: kafka:29092
    DELTA_LAKE_PATH: /delta-lake
    POSTGRES_ANALYTICS_CONN: postgresql://${POSTGRES_ANALYTICS_USER}:${POSTGRES_ANALYTICS_PASSWORD}@postgres-analytics:5432/${POSTGRES_ANALYTICS_DB}
  volumes:
    - ./airflow/dags:/opt/airflow/dags
    - ./airflow/plugins:/opt/airflow/plugins
    - ./airflow/logs:/opt/airflow/logs
    - ./delta-lake:/delta-lake
    - ./data:/data
    - ./spark/jobs:/opt/spark/jobs
  depends_on:
    postgres-meta:
      condition: service_healthy
  networks:
    - lakehouse-net

services:

  # =========================================================================
  # INFRASTRUCTURE — Zookeeper + Kafka
  # =========================================================================

  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.0
    container_name: zookeeper
    hostname: zookeeper
    env_file: .env
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
      ZOOKEEPER_INIT_LIMIT: 5
      ZOOKEEPER_SYNC_LIMIT: 2
    ports:
      - "2181:2181"
    volumes:
      - zookeeper-data:/var/lib/zookeeper/data
      - zookeeper-logs:/var/lib/zookeeper/log
    healthcheck:
      test: ["CMD", "bash", "-c", "curl -sf http://localhost:8080/commands/ruok"]
      interval: 20s
      timeout: 15s
      retries: 15
      start_period: 60s
    networks:
      - lakehouse-net

  kafka:
    image: confluentinc/cp-kafka:7.6.0
    container_name: kafka
    hostname: kafka
    env_file: .env
    depends_on:
      zookeeper:
        condition: service_healthy
    ports:
      - "9092:9092"
      - "29092:29092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_NUM_PARTITIONS: 3
      KAFKA_DEFAULT_REPLICATION_FACTOR: 1
      KAFKA_LOG_RETENTION_HOURS: 168
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
    volumes:
      - kafka-data:/var/lib/kafka/data
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "localhost:29092"]
      interval: 15s
      timeout: 10s
      retries: 10
    networks:
      - lakehouse-net

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: kafka-ui
    depends_on:
      kafka:
        condition: service_healthy
    ports:
      - "${KAFKA_UI_PORT}:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: lakehouse-cluster
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:29092
      KAFKA_CLUSTERS_0_ZOOKEEPER: zookeeper:2181
    networks:
      - lakehouse-net

  kafka-init:
    image: confluentinc/cp-kafka:7.6.0
    container_name: kafka-init
    depends_on:
      kafka:
        condition: service_healthy
    entrypoint: ["/bin/bash", "-c"]
    command:
      - |
        echo 'Creating Kafka topics...'
        kafka-topics --bootstrap-server kafka:29092 --create --if-not-exists --topic credit-card-swipes --partitions 3 --replication-factor 1
        kafka-topics --bootstrap-server kafka:29092 --create --if-not-exists --topic cc-swipes-dlq --partitions 1 --replication-factor 1
        kafka-topics --bootstrap-server kafka:29092 --create --if-not-exists --topic pipeline-events --partitions 1 --replication-factor 1
        echo 'All topics created.'
        kafka-topics --bootstrap-server kafka:29092 --list
    networks:
      - lakehouse-net

  schema-registry:
    image: confluentinc/cp-schema-registry:7.6.0
    container_name: schema-registry
    hostname: schema-registry
    depends_on:
      kafka:
        condition: service_healthy
    ports:
      - "${SCHEMA_REGISTRY_PORT}:8081"
    environment:
      SCHEMA_REGISTRY_HOST_NAME: schema-registry
      SCHEMA_REGISTRY_KAFKASTORE_BOOTSTRAP_SERVERS: kafka:29092
      SCHEMA_REGISTRY_LISTENERS: http://0.0.0.0:8081
    networks:
      - lakehouse-net

  # =========================================================================
  # METADATA DATABASE — Airflow backend
  # =========================================================================

  postgres-meta:
    image: postgres:15-alpine
    container_name: postgres-meta
    hostname: postgres-meta
    env_file: .env
    environment:
      POSTGRES_USER: ${POSTGRES_AIRFLOW_USER}
      POSTGRES_PASSWORD: ${POSTGRES_AIRFLOW_PASSWORD}
      POSTGRES_DB: ${POSTGRES_AIRFLOW_DB}
    ports:
      - "${POSTGRES_META_PORT}:5432"
    volumes:
      - postgres-meta-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_AIRFLOW_USER} -d ${POSTGRES_AIRFLOW_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - lakehouse-net

  # =========================================================================
  # ANALYTICS DATABASE — Gold layer sink + Streamlit source
  # =========================================================================

  postgres-analytics:
    image: postgres:15-alpine
    container_name: postgres-analytics
    hostname: postgres-analytics
    env_file: .env
    environment:
      POSTGRES_USER: ${POSTGRES_ANALYTICS_USER}
      POSTGRES_PASSWORD: ${POSTGRES_ANALYTICS_PASSWORD}
      POSTGRES_DB: ${POSTGRES_ANALYTICS_DB}
    ports:
      - "${POSTGRES_ANALYTICS_PORT}:5432"
    volumes:
      - postgres-analytics-data:/var/lib/postgresql/data
      - ./postgres/init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_ANALYTICS_USER} -d ${POSTGRES_ANALYTICS_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - lakehouse-net

  # =========================================================================
  # APACHE SPARK — Master + 2 Workers
  # =========================================================================

  spark-master:
    image: bitnamilegacy/spark:3.5.0
    container_name: spark-master
    hostname: spark-master
    env_file: .env
    environment:
      SPARK_MODE: master
      SPARK_RPC_AUTHENTICATION_ENABLED: "no"
      SPARK_RPC_ENCRYPTION_ENABLED: "no"
      SPARK_LOCAL_STORAGE_ENCRYPTION_ENABLED: "no"
      SPARK_SSL_ENABLED: "no"
      SPARK_MASTER_WEBUI_PORT: 8080
      SPARK_EXTRA_CLASSPATH: /opt/spark/jars/*
    ports:
      - "${SPARK_MASTER_UI_PORT}:8080"
      - "7077:7077"
    volumes:
      - ./spark/jobs:/opt/spark/jobs
      - ./spark/conf:/opt/spark/conf
      - ./delta-lake:/delta-lake
      - ./data:/data
      - spark-jars:/opt/spark/jars
    healthcheck:
      disable: true
    networks:
      - lakehouse-net

  spark-worker-1:
    image: bitnamilegacy/spark:3.5.0
    container_name: spark-worker-1
    hostname: spark-worker-1
    env_file: .env
    environment:
      SPARK_MODE: worker
      SPARK_MASTER_URL: spark://spark-master:7077
      SPARK_WORKER_MEMORY: ${SPARK_WORKER_MEMORY}
      SPARK_WORKER_CORES: ${SPARK_WORKER_CORES}
      SPARK_RPC_AUTHENTICATION_ENABLED: "no"
      SPARK_RPC_ENCRYPTION_ENABLED: "no"
      SPARK_EXTRA_CLASSPATH: /opt/spark/jars/*
    ports:
      - "${SPARK_WORKER1_UI_PORT}:8081"
    volumes:
      - ./spark/jobs:/opt/spark/jobs
      - ./delta-lake:/delta-lake
      - ./data:/data
      - spark-jars:/opt/spark/jars
    depends_on:
      spark-master:
        condition: service_started
    networks:
      - lakehouse-net

  spark-worker-2:
    image: bitnamilegacy/spark:3.5.0
    container_name: spark-worker-2
    hostname: spark-worker-2
    env_file: .env
    environment:
      SPARK_MODE: worker
      SPARK_MASTER_URL: spark://spark-master:7077
      SPARK_WORKER_MEMORY: ${SPARK_WORKER_MEMORY}
      SPARK_WORKER_CORES: ${SPARK_WORKER_CORES}
      SPARK_RPC_AUTHENTICATION_ENABLED: "no"
      SPARK_RPC_ENCRYPTION_ENABLED: "no"
      SPARK_EXTRA_CLASSPATH: /opt/spark/jars/*
    ports:
      - "${SPARK_WORKER2_UI_PORT}:8082"
    volumes:
      - ./spark/jobs:/opt/spark/jobs
      - ./delta-lake:/delta-lake
      - ./data:/data
      - spark-jars:/opt/spark/jars
    depends_on:
      spark-master:
        condition: service_started
    networks:
      - lakehouse-net

  # =========================================================================
  # APACHE AIRFLOW
  # =========================================================================

  airflow-init:
    <<: *airflow-common
    container_name: airflow-init
    entrypoint: /bin/bash
    command:
      - -c
      - |
        airflow db migrate
        airflow users create \
          --username ${AIRFLOW_ADMIN_USER} \
          --password ${AIRFLOW_ADMIN_PASSWORD} \
          --firstname Admin \
          --lastname Lakehouse \
          --role Admin \
          --email ${AIRFLOW_ADMIN_EMAIL} || true
        echo "Airflow init complete."
    environment:
      <<: *airflow-env
      _AIRFLOW_DB_MIGRATE: "true"

  airflow-webserver:
    <<: *airflow-common
    container_name: airflow-webserver
    command: webserver
    ports:
      - "${AIRFLOW_WEBSERVER_PORT}:8080"
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    depends_on:
      airflow-init:
        condition: service_completed_successfully

  airflow-scheduler:
    <<: *airflow-common
    container_name: airflow-scheduler
    command: scheduler
    healthcheck:
      test: ["CMD-SHELL", "airflow jobs check --job-type SchedulerJob --hostname $(hostname)"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    depends_on:
      airflow-init:
        condition: service_completed_successfully

  # =========================================================================
  # DATA GENERATORS
  # =========================================================================

  upi-batch-generator:
    build:
      context: ./kafka/producers
      dockerfile: Dockerfile.generator
    container_name: upi-batch-generator
    env_file: .env
    environment:
      OUTPUT_DIR: /data/raw/upi
      BATCH_INTERVAL_SECONDS: ${UPI_BATCH_INTERVAL_SECONDS}
      RECORDS_PER_BATCH: ${UPI_RECORDS_PER_BATCH}
    volumes:
      - ./data/raw/upi:/data/raw/upi
      - ./kafka/producers:/app
    command: python upi_generator.py
    networks:
      - lakehouse-net

  cc-stream-producer:
    build:
      context: ./kafka/producers
      dockerfile: Dockerfile.generator
    container_name: cc-stream-producer
    env_file: .env
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      KAFKA_TOPIC: credit-card-swipes
      STREAM_RATE_MS: ${CC_STREAM_RATE_MS}
    volumes:
      - ./kafka/producers:/app
    command: python cc_producer.py
    depends_on:
      kafka-init:
        condition: service_completed_successfully
    networks:
      - lakehouse-net

  # =========================================================================
  # DBT — SQL Transformations (Silver → Gold)
  # =========================================================================

  dbt:
    image: ghcr.io/dbt-labs/dbt-postgres:1.7.4
    container_name: dbt
    hostname: dbt
    env_file: .env
    environment:
      DBT_PROFILES_DIR: /dbt/profiles
      POSTGRES_ANALYTICS_HOST: postgres-analytics
      POSTGRES_ANALYTICS_USER: ${POSTGRES_ANALYTICS_USER}
      POSTGRES_ANALYTICS_PASSWORD: ${POSTGRES_ANALYTICS_PASSWORD}
      POSTGRES_ANALYTICS_DB: ${POSTGRES_ANALYTICS_DB}
    volumes:
      - ./dbt:/dbt
    working_dir: /dbt
    entrypoint: ["tail", "-f", "/dev/null"]
    depends_on:
      postgres-analytics:
        condition: service_healthy
    networks:
      - lakehouse-net

  # =========================================================================
  # STREAMLIT DASHBOARD
  # =========================================================================

  streamlit:
    build:
      context: ./streamlit
      dockerfile: Dockerfile.streamlit
    container_name: streamlit
    env_file: .env
    environment:
      POSTGRES_ANALYTICS_HOST: postgres-analytics
      POSTGRES_ANALYTICS_USER: ${POSTGRES_ANALYTICS_USER}
      POSTGRES_ANALYTICS_PASSWORD: ${POSTGRES_ANALYTICS_PASSWORD}
      POSTGRES_ANALYTICS_DB: ${POSTGRES_ANALYTICS_DB}
      REFRESH_INTERVAL_SECONDS: ${DASHBOARD_REFRESH_SECONDS}
    ports:
      - "${STREAMLIT_PORT}:8501"
    volumes:
      - ./streamlit:/app
    depends_on:
      postgres-analytics:
        condition: service_healthy
    networks:
      - lakehouse-net

  # =========================================================================
  # PGADMIN
  # =========================================================================

  pgadmin:
    image: dpage/pgadmin4:8.4
    container_name: pgadmin
    env_file: .env
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD}
    ports:
      - "${PGADMIN_PORT}:80"
    volumes:
      - pgadmin-data:/var/lib/pgadmin
    depends_on:
      - postgres-analytics
      - postgres-meta
    networks:
      - lakehouse-net

# =============================================================================
# VOLUMES
# =============================================================================

volumes:
  zookeeper-data:
  zookeeper-logs:
  kafka-data:
  postgres-meta-data:
  postgres-analytics-data:
  pgadmin-data:
  spark-jars:

# =============================================================================
# NETWORKS
# =============================================================================

networks:
  lakehouse-net:
    driver: bridge
    ipam:
      config:
        - subnet: 172.28.0.0/16